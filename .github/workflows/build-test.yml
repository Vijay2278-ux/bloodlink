name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: |
        corepack enable
        pnpm install --frozen-lockfile

    - name: Run linter
      run: pnpm run lint
      continue-on-error: true

    - name: Build application
      run: pnpm run build
      env:
        JWT_SECRET: ${"edu-platform-jwt-secret-2024-secure-key-production"}
        DATABASE_URL: ${"postgresql://neondb_owner:npg_Pu1Cmp3SgkXA@ep-snowy-river-aqxrta3u-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"}

    - name: Type check
      run: pnpm exec tsc --noEmit
      continue-on-error: true

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: next-build-${{ matrix.node-version }}
        path: .next
        retention-days: 5
